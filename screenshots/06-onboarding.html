<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1290">
  <title>Awaitr — Onboarding</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    body { width: 1290px; height: 2796px; overflow: hidden; }
  </style>
</head>
<body>
  <div class="screenshot-page">
    <div class="marketing-headline">
      <h1>Your Personal<br>Waitlist Manager</h1>
    </div>

    <div class="phone-frame">
      <div class="phone-content onboarding-bg" style="min-height: 1900px; display: flex; flex-direction: column; align-items: center;">
        <!-- Status Bar -->
        <div class="status-bar" style="width: 100%;">
          <span class="time">9:41</span>
          <div class="icons">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
          </div>
        </div>

        <!-- Skip button top-right -->
        <div style="width: 100%; text-align: right; padding: 16px 0;">
          <span style="font-size: 26px; color: var(--muted); font-weight: 500;">Skip</span>
        </div>

        <!-- Spacer -->
        <div style="flex: 1;"></div>

        <!-- App Icon -->
        <div class="app-icon-css">
          <div class="glass-highlight"></div>
          <span class="letter-a">A</span>
        </div>

        <!-- Title & Subtitle -->
        <div style="text-align: center; margin-top: 60px;">
          <div style="font-size: 52px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px;">Welcome to Awaitr</div>
          <div style="font-size: 30px; color: var(--muted); font-weight: 500; margin-top: 16px;">Your personal waitlist manager</div>
        </div>

        <!-- Spacer -->
        <div style="flex: 1.5;"></div>

        <!-- Page Dots -->
        <div class="page-dots" style="margin-bottom: 40px;">
          <div class="page-dot active"></div>
          <div class="page-dot"></div>
          <div class="page-dot"></div>
          <div class="page-dot"></div>
        </div>

        <!-- Get Started Button -->
        <button class="onboard-btn">Get Started</button>

        <!-- Spacer -->
        <div style="height: 40px;"></div>

        <!-- Home Indicator -->
        <div class="home-indicator"><div class="bar"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
