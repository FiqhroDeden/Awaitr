<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1290">
  <title>Awaitr — Add Item</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    body { width: 1290px; height: 2796px; overflow: hidden; }
  </style>
</head>
<body>
  <div class="screenshot-page">
    <div class="marketing-headline">
      <h1>Add a Wait<br>in Seconds</h1>
    </div>

    <div class="phone-frame">
      <div class="phone-content">
        <!-- Status Bar -->
        <div class="status-bar">
          <span class="time">9:41</span>
          <div class="icons">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
          </div>
        </div>

        <!-- Nav Bar (toolbar style) -->
        <div class="nav-bar-toolbar">
          <span class="nav-cancel">Cancel</span>
          <span class="nav-center">New Item</span>
          <span class="nav-save">Save</span>
        </div>

        <!-- Title Card -->
        <div class="glass-card">
          <div class="section-label">Title</div>
          <div class="form-field" style="border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 16px;">MacBook Pro M5 order</div>
          <div class="char-counter">24 / 80</div>
        </div>

        <!-- Category Card -->
        <div class="glass-card">
          <div class="section-label">Category</div>
          <div class="category-grid">
            <div class="category-option">
              <span class="cat-emoji">💼</span>
              <span style="color: var(--job);">Jobs</span>
            </div>
            <div class="category-option selected" style="border-color: var(--product); background: rgba(226,75,74,0.08);">
              <span class="cat-emoji">📦</span>
              <span style="color: var(--product);">Products</span>
            </div>
            <div class="category-option">
              <span class="cat-emoji">📋</span>
              <span style="color: var(--admin);">Admin</span>
            </div>
            <div class="category-option">
              <span class="cat-emoji">🎪</span>
              <span style="color: var(--event);">Events</span>
            </div>
          </div>
        </div>

        <!-- Dates Card -->
        <div class="glass-card">
          <div class="section-label">Dates</div>
          <div class="date-row">
            <span class="date-label">Submitted</span>
            <span class="date-value" style="color: var(--job);">Mar 22, 2026</span>
          </div>
          <div class="date-row">
            <span class="date-label">Expected by</span>
            <span class="date-value" style="color: var(--job);">May 1, 2026</span>
          </div>
          <div class="date-row">
            <span class="date-label">Follow-up reminder</span>
            <span class="date-value" style="color: var(--light);">Set date</span>
          </div>
        </div>

        <!-- Priority Card -->
        <div class="glass-card">
          <div class="section-label">Priority</div>
          <div class="priority-picker">
            <div class="priority-option" style="color: var(--pri-low);">Low</div>
            <div class="priority-option" style="color: var(--pri-medium);">Medium</div>
            <div class="priority-option selected" style="color: var(--pri-high); border-color: var(--pri-high); background: rgba(226,75,74,0.08);">High</div>
          </div>
        </div>

        <!-- Notes Card -->
        <div class="glass-card">
          <div class="section-label">Notes</div>
          <div class="form-field" style="color: var(--light); min-height: 80px;">Add notes...</div>
          <div class="char-counter">0 / 500</div>
        </div>

        <!-- Home Indicator -->
        <div class="home-indicator"><div class="bar"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
